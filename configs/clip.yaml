_base_: "default.yml"
defaults:
  - _self_

seed: 0
model_name: CLIP_OVSS
model:
  type: CLIP_OVSS
  clip_backbone: maskclip
  vit_patch_size: 16
  backbones: ["CLIP"]

experiment: "RNS_CLIP"

support:
  images_per_class: 1 # number of support images per class
  support_seed: 100 # seed for the support set sampling
  max_samples: 5000 # max support images
  k: 4 # number of neighbors to retrieve from the memory bank
  vlm_feat_dim: 512 # dimension of the visual features
  drop_classes_fraction: 0.0 # fraction of classes w/o support images
  drop_text_fraction: 0.0 # fraction of classes w/o class names
  crop_sizes: [448, 224] # different crop sizes in sliding window feat extraction
  strides: [112] # different strides in sliding window feat extraction
  scales: [[2048, 448]] # different scales to load support images

test:
  test_crop_size: 448 # crop size in sliding window feat extraction at test time
  test_crop_stride: 224 # stride in sliding window feat extraction at test time
  scales: [[2048, 448]] # different scales to load test images

method:
  mask_proposal_strategy: "None" # "SAM", "None"
  use_text: true
  class_score_temperature: 10.0
  beta_mixed: 1.5
  beta_pseudo: 0.2
  lr: 0.002
  batch_size: 1024
  epochs: 700

evaluate:
  eval_only: true
  task:
    - voc

  # evaluation
  voc: segmentation/configs/_base_/datasets/pascal_voc12.py
  context: segmentation/configs/_base_/datasets/pascal_context.py
  context59: segmentation/configs/_base_/datasets/pascal_context59.py
  coco_stuff: segmentation/configs/_base_/datasets/stuff.py
  coco_object: segmentation/configs/_base_/datasets/coco.py
  cityscapes: segmentation/configs/_base_/datasets/cityscapes.py
  ade20k: segmentation/configs/_base_/datasets/ade20k.py



